version: "3.8"

services:
  backend:
    build:
      context: ./expenses_backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-my-secret-key}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/users"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./expenses_frontend
      dockerfile: Dockerfile
    environment:
      API_URL: http://backend:8080/api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
